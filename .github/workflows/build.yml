name: Windows EXE ビルド

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # 手動実行ボタンも有効にする

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: コードを取得
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: ライブラリインストール
        run: |
          pip install pyinstaller gspread google-auth

      - name: PyInstaller でビルド
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name "架電カウンター" `
            --add-data "config.json;." `
            main.py

      - name: exe をアップロード
        uses: actions/upload-artifact@v4
        with:
          name: 架電カウンター-exe
          path: dist/架電カウンター.exe
          retention-days: 30
